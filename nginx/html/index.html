<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sandbox.seogyoung.com</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      font-family: 'Segoe UI', sans-serif;
      color: #333;
    }

    .card {
      text-align: center;
      padding: 3rem 4rem;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
    }

    .emoji { font-size: 3rem; margin-bottom: 1rem; }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: -0.5px;
    }

    p {
      font-size: 0.95rem;
      color: #888;
      margin-bottom: 1.5rem;
    }

    .badge {
      display: inline-block;
      padding: 0.3rem 0.9rem;
      background: #f0f0f0;
      border-radius: 99px;
      font-size: 0.8rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🌱</div>
    <h1>sandbox.seogyoung.com</h1>
    <p>서경님의 개인 샌드박스 서버입니다</p>
    <span class="badge">여기엔 아무것도 없어요</span>
  </div>
</body>
</html>
